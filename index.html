<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carpet Decors | Premium Carpets Online</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="sections.css">
  <link rel="stylesheet" href="shop.css">
  <link rel="stylesheet" href="responsive.css">
</head>
<body>
  <div class="skeleton" id="skeleton">
    <div class="loader">
      <div class="sk-line short"></div>
      <div class="sk-line"></div>
      <div class="sk-card"></div>
      <div class="sk-line"></div>
    </div>
  </div>

  <div class="top-strip">Flat 40% Off + Free Shipping Today | Use code <strong>CARPET40</strong> at checkout</div>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="#home" aria-label="Carpet Decors home">
        <span class="brand-mark">CD</span>
        <span>Carpet Decors</span>
      </a>
      <div class="nav-links" id="navLinks"></div>
      <div class="nav-actions">
        <button class="icon-btn mobile-menu" id="menuBtn" aria-label="Open menu">☰</button>
        <button class="icon-btn search-toggle" id="searchBtn" aria-label="Search">⌕</button>
        <button class="icon-btn" id="wishlistBtn" aria-label="Wishlist">♡<span class="counter" id="wishCount">0</span></button>
        <button class="icon-btn" id="cartBtn" aria-label="Open cart">🛒<span class="counter" id="cartCount">0</span></button>
      </div>
    </nav>
  </header>

  <main id="app"></main>

  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="cart-drawer" id="cartDrawer" aria-label="Shopping cart">
    <div class="drawer-head">
      <strong>Your Cart</strong>
      <button class="close-btn" id="closeCart" aria-label="Close cart">×</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="drawer-foot" id="drawerFoot"></div>
  </aside>

  <div class="toast" id="purchaseToast"></div>

  <div class="float-actions">
    <button class="btn primary pulse" id="whatsappBtn" aria-label="Order on WhatsApp">☎</button>
    <button class="btn ghost" id="topBtn" aria-label="Back to top">↑</button>
  </div>

  <div class="modal-overlay" id="exitOverlay"></div>
  <div class="modal" id="exitModal" role="dialog" aria-modal="true" aria-label="Exclusive carpet offer">
    <div class="modal-media"></div>
    <div class="modal-body">
      <p class="eyebrow">Wait, unlock extra savings</p>
      <h2>Take an extra 10% off your first carpet order.</h2>
      <p class="lead">Join the Carpet Decors List and get early access to limited artisan drops, size restocks, and private sale prices.</p>
      <div class="newsletter-form">
        <input class="field" id="exitEmail" placeholder="Enter your email">
        <button class="btn primary" id="exitClaim">Claim Offer</button>
      </div>
      <button class="btn ghost full" id="exitClose" style="margin-top:10px">Continue Shopping</button>
    </div>
  </div>

  <div class="mobile-bottom">
    <button data-route="home"><b>⌂</b>Home</button>
    <button data-route="shop"><b>⌕</b>Shop</button>
    <button data-route="offers"><b>%</b>Offers</button>
    <button id="mobileCart"><b>🛒</b>Cart</button>
    <button data-route="track"><b>◎</b>Track</button>
  </div>
  <script src="data.js"></script>
  <script src="state.js"></script>
  <script src="views.js"></script>
  <script src="actions.js"></script>
</body>
</html>
