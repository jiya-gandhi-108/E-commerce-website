<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ibrahim Trading Co. | Premium Carpets Online</title>
  <style>
    :root {
      --white: #ffffff;
      --ink: #1f2423;
      --muted: #68716f;
      --line: #e8e3d9;
      --soft: #faf7f0;
      --beige: #eadfcf;
      --emerald: #0f7a4f;
      --emerald-dark: #07583a;
      --gold: #c98b2e;
      --danger: #b23434;
      --shadow: 0 18px 50px rgba(31,36,35,.11);
      --radius: 8px;
      --speed: 220ms;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--white);
      letter-spacing: 0;
    }
    body.lock { overflow: hidden; }
    img { max-width: 100%; display: block; }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; text-decoration: none; }

    .top-strip {
      background: var(--emerald-dark);
      color: white;
      text-align: center;
      font-size: 13px;
      padding: 9px 14px;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line);
    }
    .nav {
      max-width: 1220px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 22px;
      align-items: center;
      min-height: 72px;
      padding: 0 18px;
    }
    .brand {
      display: flex;
      gap: 10px;
      align-items: center;
      font-weight: 900;
      font-size: 20px;
      white-space: nowrap;
    }
    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--emerald), #23a36d);
      display: grid;
      place-items: center;
      color: white;
      font-weight: 900;
      box-shadow: 0 9px 22px rgba(15,122,79,.25);
    }
    .nav-links {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .nav-link {
      border: 0;
      background: transparent;
      color: #38413f;
      padding: 10px 12px;
      border-radius: 7px;
      font-weight: 750;
      font-size: 14px;
      transition: background var(--speed), color var(--speed);
    }
    .nav-link:hover, .nav-link.active {
      background: #edf7f2;
      color: var(--emerald-dark);
    }
    .nav-actions { display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      position: relative;
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      background: white;
      border-radius: 8px;
      display: grid;
      place-items: center;
      transition: transform var(--speed), box-shadow var(--speed), border-color var(--speed);
    }
    .icon-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(31,36,35,.09); border-color: #d9d1c3; }
    .counter {
      position: absolute;
      top: -6px;
      right: -6px;
      min-width: 19px;
      height: 19px;
      padding: 0 5px;
      border-radius: 99px;
      background: var(--emerald);
      color: white;
      font-size: 11px;
      display: grid;
      place-items: center;
      font-weight: 850;
    }
    .mobile-menu { display: none; }

    .container {
      max-width: 1220px;
      margin: 0 auto;
      padding: 0 18px;
    }
    .section { padding: 54px 0; }
    .section.tight { padding: 30px 0; }
    .eyebrow {
      color: var(--emerald);
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin: 0 0 10px;
    }
    h1, h2, h3, p { margin-top: 0; }
    h1 {
      font-size: clamp(38px, 5.2vw, 70px);
      line-height: .98;
      letter-spacing: 0;
      margin-bottom: 18px;
    }
    h2 {
      font-size: clamp(28px, 3.2vw, 42px);
      line-height: 1.08;
      margin-bottom: 12px;
    }
    .lead {
      color: var(--muted);
      font-size: 18px;
      line-height: 1.6;
      max-width: 720px;
    }
    .btn {
      border: 0;
      border-radius: 8px;
      padding: 13px 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      font-weight: 900;
      background: var(--ink);
      color: white;
      min-height: 48px;
      transition: transform var(--speed), box-shadow var(--speed), background var(--speed);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 14px 28px rgba(31,36,35,.16); }
    .btn.primary {
      background: var(--emerald);
      box-shadow: 0 14px 28px rgba(15,122,79,.21);
    }
    .btn.primary:hover { background: var(--emerald-dark); }
    .btn.ghost {
      color: var(--ink);
      background: white;
      border: 1px solid var(--line);
    }
    .btn.full { width: 100%; }
    .pulse {
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(15,122,79,.35); }
      50% { box-shadow: 0 0 0 9px rgba(15,122,79,0); }
    }

    .hero {
      background:
        linear-gradient(90deg, rgba(255,255,255,.98) 0%, rgba(255,255,255,.86) 42%, rgba(255,255,255,.32) 70%),
        url("https://images.unsplash.com/photo-1600166898405-da9535204843?auto=format&fit=crop&w=1800&q=80") center/cover;
      min-height: 690px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--line);
    }
    .hero-inner {
      max-width: 1220px;
      margin: 0 auto;
      width: 100%;
      padding: 52px 18px 80px;
    }
    .hero-copy { max-width: 640px; }
    .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; margin: 28px 0 22px; }
    .hero-proof { display: flex; gap: 18px; flex-wrap: wrap; color: #3d4644; font-weight: 800; font-size: 14px; }
    .hero-proof span { display: inline-flex; align-items: center; gap: 7px; }
    .sale-banner {
      background: var(--ink);
      color: white;
      border-radius: 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 18px;
      margin-top: -45px;
      position: relative;
      z-index: 2;
      box-shadow: var(--shadow);
    }
    .sale-banner strong { color: #9ff0c9; }
    .timer { display: flex; gap: 8px; }
    .time-box {
      width: 58px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 8px;
      padding: 8px 4px;
      text-align: center;
      background: rgba(255,255,255,.08);
    }
    .time-box b { display: block; font-size: 19px; }
    .time-box small { color: rgba(255,255,255,.72); font-size: 10px; text-transform: uppercase; }

    .trust-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 12px;
    }
    .trust-item, .info-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 8px 26px rgba(31,36,35,.05);
    }
    .trust-item strong { display: block; margin-bottom: 5px; }
    .trust-item p, .info-card p { color: var(--muted); margin: 0; line-height: 1.5; font-size: 14px; }
    .icon {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: #edf7f2;
      color: var(--emerald);
      display: grid;
      place-items: center;
      margin-bottom: 12px;
      font-size: 19px;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }
    .section-head p { margin: 0; color: var(--muted); max-width: 580px; line-height: 1.55; }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 18px;
    }
    .product-card {
      position: relative;
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      transition: transform var(--speed), box-shadow var(--speed), border-color var(--speed);
    }
    .product-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: #d8cfbf; }
    .product-media {
      position: relative;
      aspect-ratio: 1 / .78;
      background: var(--soft);
      overflow: hidden;
    }
    .product-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 420ms;
    }
    .product-card:hover img { transform: scale(1.05); }
    .badge-row {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: start;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 99px;
      padding: 6px 9px;
      font-size: 11px;
      font-weight: 900;
      background: var(--emerald);
      color: white;
      white-space: nowrap;
    }
    .badge.hot { background: var(--danger); }
    .badge.soft { background: rgba(255,255,255,.92); color: var(--ink); border: 1px solid rgba(0,0,0,.08); }
    .wishlist {
      position: absolute;
      top: 52px;
      right: 10px;
      z-index: 3;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 0;
      background: rgba(255,255,255,.95);
      color: var(--ink);
      font-size: 18px;
      box-shadow: 0 8px 18px rgba(31,36,35,.12);
    }
    .wishlist.active { color: var(--danger); }
    .product-body { padding: 14px; }
    .rating { color: #d08a16; font-size: 13px; font-weight: 900; display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
    .rating span { color: var(--muted); font-weight: 750; }
    .product-title {
      font-size: 16px;
      line-height: 1.3;
      margin: 0 0 8px;
      font-weight: 900;
    }
    .product-meta {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
      min-height: 34px;
      line-height: 1.35;
    }
    .price-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .price { font-size: 19px; font-weight: 950; }
    .mrp { color: #8c9492; text-decoration: line-through; font-size: 13px; }
    .save { color: var(--emerald); font-weight: 900; font-size: 13px; }
    .card-actions { display: grid; grid-template-columns: 1fr 44px; gap: 8px; }
    .quick {
      border: 1px solid var(--line);
      background: white;
      border-radius: 8px;
      font-weight: 900;
      min-height: 44px;
    }

    .filters {
      display: grid;
      grid-template-columns: 1.4fr repeat(4, minmax(120px, .7fr));
      gap: 10px;
      margin: 22px 0;
      background: var(--soft);
      border: 1px solid var(--line);
      padding: 12px;
      border-radius: 8px;
    }
    .field {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      background: white;
      border-radius: 8px;
      padding: 0 12px;
      color: var(--ink);
      outline: none;
    }
    .field:focus { border-color: var(--emerald); box-shadow: 0 0 0 3px rgba(15,122,79,.11); }

    .offer-band {
      background: var(--soft);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .offer-grid {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 22px;
      align-items: center;
    }
    .offer-panel {
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .coupon-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    .coupon {
      border: 1px dashed var(--emerald);
      color: var(--emerald-dark);
      background: #edf7f2;
      padding: 12px 14px;
      border-radius: 8px;
      font-weight: 950;
    }

    .review-grid, .info-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 16px;
    }
    .testimonial {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px;
      background: white;
    }
    .testimonial p { color: #46504e; line-height: 1.6; }
    .avatar-row { display: flex; align-items: center; gap: 10px; }
    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--beige);
      display: grid;
      place-items: center;
      font-weight: 950;
      color: var(--emerald-dark);
    }

    .newsletter {
      background: var(--ink);
      color: white;
      border-radius: 8px;
      padding: 30px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: center;
    }
    .newsletter p { color: rgba(255,255,255,.74); margin: 0; }
    .newsletter-form { display: flex; gap: 10px; min-width: min(480px, 100%); }
    .newsletter .field { border-color: rgba(255,255,255,.18); }

    .page-title {
      background: var(--soft);
      border-bottom: 1px solid var(--line);
      padding: 38px 0;
    }
    .page-title p { margin: 0; color: var(--muted); max-width: 720px; line-height: 1.55; }

    .product-detail {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(340px, .78fr);
      gap: 36px;
      align-items: start;
    }
    .gallery-main {
      aspect-ratio: 1 / .72;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: var(--soft);
    }
    .gallery-main img { width: 100%; height: 100%; object-fit: cover; }
    .thumbs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 10px;
    }
    .thumb {
      border: 2px solid transparent;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 1 / .72;
      padding: 0;
      background: var(--soft);
    }
    .thumb.active { border-color: var(--emerald); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .detail-panel {
      position: sticky;
      top: 96px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
      background: white;
      box-shadow: 0 8px 26px rgba(31,36,35,.06);
    }
    .swatches, .sizes {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0 18px;
    }
    .choice {
      border: 1px solid var(--line);
      background: white;
      border-radius: 8px;
      padding: 10px 12px;
      min-height: 42px;
      font-weight: 850;
    }
    .choice.active {
      border-color: var(--emerald);
      box-shadow: 0 0 0 3px rgba(15,122,79,.1);
      color: var(--emerald-dark);
    }
    .swatch-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,.12);
      display: inline-block;
      vertical-align: middle;
      margin-right: 7px;
    }
    .stock-line {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--danger);
      font-weight: 900;
      margin: 14px 0;
    }
    .progress {
      height: 8px;
      background: #f0ece4;
      border-radius: 99px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress span { display: block; height: 100%; background: var(--danger); width: 24%; border-radius: inherit; }
    .tabs {
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      margin-top: 34px;
      overflow-x: auto;
    }
    .tab {
      border: 0;
      background: transparent;
      padding: 13px 14px;
      font-weight: 900;
      color: var(--muted);
      white-space: nowrap;
    }
    .tab.active { color: var(--emerald-dark); border-bottom: 3px solid var(--emerald); }
    .tab-content { padding: 18px 0; color: #48514f; line-height: 1.65; }

    .cart-layout, .checkout-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 22px;
      align-items: start;
    }
    .cart-list, .summary-box, .checkout-form, .track-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      padding: 18px;
    }
    .cart-row {
      display: grid;
      grid-template-columns: 96px 1fr auto;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
      align-items: center;
    }
    .cart-row:last-child { border-bottom: 0; }
    .cart-img { width: 96px; height: 76px; border-radius: 8px; object-fit: cover; }
    .qty {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      height: 38px;
      background: white;
    }
    .qty button { width: 36px; border: 0; background: white; font-weight: 950; }
    .qty span { width: 38px; display: grid; place-items: center; border-left: 1px solid var(--line); border-right: 1px solid var(--line); font-weight: 900; }
    .summary-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      color: #46504e;
    }
    .summary-line.total { border-bottom: 0; font-size: 20px; font-weight: 950; color: var(--ink); }
    .coupon-form { display: flex; gap: 8px; margin: 12px 0; }
    .coupon-form input { flex: 1; min-width: 0; }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 12px;
    }
    .form-grid .wide { grid-column: 1 / -1; }
    textarea.field { padding-top: 12px; min-height: 110px; resize: vertical; }
    .secure-row { display: flex; flex-wrap: wrap; gap: 10px; color: var(--muted); font-size: 13px; margin-top: 12px; }

    .track-steps {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }
    .step {
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 12px;
      align-items: start;
    }
    .step-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #edf7f2;
      color: var(--emerald);
      font-weight: 950;
    }
    .step.pending .step-dot { background: #f1eee8; color: #8d928f; }

    .faq-list { display: grid; gap: 10px; }
    .faq-item { border: 1px solid var(--line); border-radius: 8px; background: white; overflow: hidden; }
    .faq-q {
      width: 100%;
      border: 0;
      background: white;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      text-align: left;
      font-weight: 950;
      color: var(--ink);
    }
    .faq-a { display: none; padding: 0 16px 16px; color: var(--muted); line-height: 1.6; }
    .faq-item.open .faq-a { display: block; }

    .drawer-overlay, .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(31,36,35,.42);
      z-index: 60;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--speed);
    }
    .drawer-overlay.open, .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .cart-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(430px, 92vw);
      height: 100dvh;
      background: white;
      z-index: 70;
      transform: translateX(105%);
      transition: transform 260ms ease;
      display: grid;
      grid-template-rows: auto 1fr auto;
      box-shadow: -18px 0 50px rgba(0,0,0,.18);
    }
    .cart-drawer.open { transform: translateX(0); }
    .drawer-head, .drawer-foot {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .drawer-foot { border-top: 1px solid var(--line); border-bottom: 0; display: block; }
    .drawer-body { overflow: auto; padding: 0 16px; }
    .close-btn {
      border: 1px solid var(--line);
      background: white;
      border-radius: 8px;
      width: 38px;
      height: 38px;
      font-size: 20px;
    }

    .toast {
      position: fixed;
      left: 18px;
      bottom: 96px;
      z-index: 55;
      width: min(340px, calc(100vw - 36px));
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 12px;
      display: grid;
      grid-template-columns: 54px 1fr;
      gap: 10px;
      transform: translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--speed), transform var(--speed);
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast img { width: 54px; height: 54px; object-fit: cover; border-radius: 8px; }
    .toast p { margin: 0; font-size: 13px; color: var(--muted); line-height: 1.35; }
    .toast strong { color: var(--ink); }

    .float-actions {
      position: fixed;
      right: 18px;
      bottom: 88px;
      z-index: 50;
      display: grid;
      gap: 10px;
    }
    .float-actions .btn { width: 52px; height: 52px; padding: 0; border-radius: 50%; font-size: 20px; }

    .modal {
      position: fixed;
      z-index: 80;
      inset: auto 18px 50%;
      transform: translateY(50%) scale(.96);
      margin: 0 auto;
      width: min(520px, calc(100vw - 36px));
      background: white;

      renderNav();
      updateCounters();
      const pages = {home:homePage, shop:shopPage, product:productPage, offers:offersPage, cart:cartPage, checkout:checkoutPage, track:trackPage, faqs:faqPage, about:aboutPage, contact:contactPage};
      app.innerHTML = (pages[state.route] || homePage)();
      bindPageEvents();
      renderDrawer();
      revealSoon();
    }

    function bindPageEvents() {
      const searchInput = document.getElementById("searchInput");
      if (searchInput) {
        searchInput.onkeydown = e => { if (e.key === "Enter") { state.search = e.target.value; render(); } };
        searchInput.onchange = e => { state.search = e.target.value; render(); };
      }
      const categoryFilter = document.getElementById("categoryFilter");
      if (categoryFilter) categoryFilter.onchange = e => { state.category = e.target.value; render(); };
      const styleFilter = document.getElementById("styleFilter");
      if (styleFilter) styleFilter.onchange = e => { state.style = e.target.value; render(); };
      const sortFilter = document.getElementById("sortFilter");
      if (sortFilter) sortFilter.onchange = e => { state.sort = e.target.value; render(); };
    }

    function revealSoon() {
      const items = document.querySelectorAll(".reveal");
      const io = new IntersectionObserver(entries => {
        entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add("visible"); });
      }, {threshold:.08});
      items.forEach(el => io.observe(el));
    }

    function addToCart(id, open) {
      const p = getProduct(id);
      const existing = state.cart.find(item => item.id === id && item.size === (state.selectedSize || p.size[0]) && item.color === (state.selectedColor || p.colors[0]));
      if (existing) existing.qty += 1;
      else state.cart.push({id, qty:1, size:state.selectedSize || p.size[0], color:state.selectedColor || p.colors[0]});
      saveState();
      updateCounters();
      renderDrawer();
      if (open) openCart();
      showMiniMessage(`${p.name} added to cart`);
    }

    function changeQty(id, delta) {
      const item = state.cart.find(i => i.id === id);
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) state.cart = state.cart.filter(i => i !== item);
      saveState();
      render();
    }

    function removeItem(id) {
      state.cart = state.cart.filter(i => i.id !== id);
      saveState();
      render();
    }

    function toggleWishlist(id) {
      state.wishlist = state.wishlist.includes(id) ? state.wishlist.filter(x => x !== id) : [...state.wishlist, id];
      saveState();
      render();
    }

    function toggleCompare(id) {
      if (state.compare.includes(id)) state.compare = state.compare.filter(x => x !== id);
      else state.compare = [...state.compare.slice(-2), id];
      render();
    }

    function applyCoupon(code) {
      state.coupon = (code || "").trim().toUpperCase();
      if (state.coupon !== "IBRAHIM40") alert("Try IBRAHIM40 for an extra discount.");
      render();
      showMiniMessage(state.coupon === "IBRAHIM40" ? "Coupon IBRAHIM40 applied" : "Coupon checked");
    }

    function clearFilters() {
      state.search = ""; state.category = "All"; state.style = "All"; state.sort = "featured"; render();
    }

    function openCart() {
      cartDrawer.classList.add("open");
      drawerOverlay.classList.add("open");
      document.body.classList.add("lock");
    }

    function closeCart() {
      cartDrawer.classList.remove("open");
      drawerOverlay.classList.remove("open");
      document.body.classList.remove("lock");
    }

    function renderDrawer() {
      drawerBody.innerHTML = cartContent(true);
      drawerFoot.innerHTML = state.cart.length ? `${summaryBox()}` : `<button class="btn primary full" onclick="navigate('shop'); closeCart()">Shop Best Sellers</button>`;
    }

    function setGallery(i) { state.galleryIndex = i; render(); }
    function selectSize(s) { state.selectedSize = s; render(); }
    function selectColor(c) { state.selectedColor = c; render(); }
    function switchTab(btn, tab) {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("tabContent").innerHTML = detailText(getProduct(state.selectedProduct), tab);
    }
    function toggleFaq(btn) { btn.parentElement.classList.toggle("open"); }
    function showTracking() { document.getElementById("trackingResult").innerHTML = trackingSteps(); showMiniMessage("Tracking details updated"); }

    function placeOrder() {
      if (!state.cart.length) { alert("Your cart is empty."); return; }
      state.cart = [];
      saveState();
      state.route = "track";
      render();
      alert("Order placed successfully. Your tracking ID is ITC48291.");
    }

    function whatsapp() {
      const text = encodeURIComponent("Hi Ibrahim Trading Co., I want help choosing a premium carpet.");
      window.open("https://wa.me/919876543210?text=" + text, "_blank");
    }

    function showMiniMessage(text) {
      const toast = document.getElementById("purchaseToast");
      const p = products[Math.floor(Math.random() * products.length)];
      toast.innerHTML = `<img src="${p.img}" alt=""><p><strong>${text}</strong><br>Free shipping and IBRAHIM40 offer are active now.</p>`;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2800);
    }

    function randomPurchase() {
      const names = ["Ritika from Pune", "Arjun from Delhi", "Meera from Bengaluru", "Kabir from Jaipur", "Ananya from Mumbai"];
      const p = products[Math.floor(Math.random() * products.length)];
      const toast = document.getElementById("purchaseToast");
      toast.innerHTML = `<img src="${p.img}" alt=""><p><strong>${names[Math.floor(Math.random()*names.length)]}</strong> recently bought<br>${p.name}</p>`;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 4200);
    }

    function countdown() {
      let end = Date.now() + 1000 * 60 * 60 * 5 + 1000 * 60 * 42;
      setInterval(() => {
        const left = Math.max(0, end - Date.now());
        const h = String(Math.floor(left / 3600000)).padStart(2,"0");
        const m = String(Math.floor(left % 3600000 / 60000)).padStart(2,"0");
        const s = String(Math.floor(left % 60000 / 1000)).padStart(2,"0");
        ["hh","mm","ss"].forEach((id,i) => {
          const el = document.getElementById(id);
          if (el) el.textContent = [h,m,s][i];
        });
      }, 1000);
    }

    function visitorPulse() {
      setInterval(() => {
        const el = document.getElementById("visitorCount");
        if (el) el.textContent = 110 + Math.floor(Math.random() * 58);
        const live = document.getElementById("liveViews");
        if (live) live.textContent = `· ${18 + Math.floor(Math.random()*24)} viewing now`;
      }, 2500);
    }

    let exitShown = localStorage.getItem("lh_exit") === "1";
    function showExit() {
      if (exitShown) return;
      exitShown = true;
      localStorage.setItem("lh_exit","1");
      document.getElementById("exitOverlay").classList.add("open");
      document.getElementById("exitModal").classList.add("open");
    }
    function closeExit() {
      document.getElementById("exitOverlay").classList.remove("open");
      document.getElementById("exitModal").classList.remove("open");
    }

    document.getElementById("cartBtn").onclick = openCart;
    document.getElementById("mobileCart").onclick = openCart;
    document.getElementById("closeCart").onclick = closeCart;
    drawerOverlay.onclick = closeCart;
    document.getElementById("menuBtn").onclick = () => navLinks.classList.toggle("open");
    document.getElementById("searchBtn").onclick = () => navigate("shop");
    document.getElementById("wishlistBtn").onclick = () => {
      state.route = "shop";
      state.search = "";
      render();
      showMiniMessage(`${state.wishlist.length} carpet${state.wishlist.length === 1 ? "" : "s"} saved to wishlist`);
    };
    document.getElementById("topBtn").onclick = () => window.scrollTo({top:0, behavior:"smooth"});
    document.getElementById("whatsappBtn").onclick = whatsapp;
    document.getElementById("exitClose").onclick = closeExit;
    document.getElementById("exitOverlay").onclick = closeExit;
    document.getElementById("exitClaim").onclick = () => { closeExit(); applyCoupon("IBRAHIM40"); };
    document.addEventListener("mouseleave", e => { if (e.clientY <= 0) showExit(); });
    window.addEventListener("hashchange", () => {
      const route = location.hash.replace("#","");
      if (navItems.some(i => i[0] === route)) { state.route = route; render(); }
    });

    window.toggleWishlist = toggleWishlist;
    window.toggleCompare = toggleCompare;
    window.addToCart = addToCart;
    window.navigate = navigate;
    window.applyCoupon = applyCoupon;
    window.clearFilters = clearFilters;
    window.changeQty = changeQty;
    window.removeItem = removeItem;
    window.setGallery = setGallery;
    window.selectSize = selectSize;
    window.selectColor = selectColor;
    window.switchTab = switchTab;
    window.toggleFaq = toggleFaq;
    window.showTracking = showTracking;
    window.placeOrder = placeOrder;
    window.openCart = openCart;
    window.closeCart = closeCart;
    window.whatsapp = whatsapp;

    render();
    countdown();
    visitorPulse();
    setInterval(randomPurchase, 9000);
    setTimeout(() => document.getElementById("skeleton").classList.add("hide"), 650);
    setTimeout(randomPurchase, 2300);
  </script>
</body>
</html>
